name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# pull-requests: write lets the skill post the review comment via gh pr review
permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip drafts and bot-authored PRs
    if: "!github.event.pull_request.draft && github.actor != 'dependabot[bot]'"
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Review PR
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude -p "/review-pr ${{ github.event.pull_request.number }} --repo ${{ github.repository }}" \
            --allowedTools "Bash,Read,Glob,Grep"
